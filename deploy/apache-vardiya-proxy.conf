# =============================================================================
# Vardiya Node uygulamasini Apache uzerinden yayinlamak (404 cozumu)
# =============================================================================
# Bu dosyayi dogrudan kopyalamayin; icerigi Apache VirtualHost'unuza uyarlayip
# sunucunuzda etkinlestirin. mod_proxy ve mod_proxy_http acik olmali:
#   a2enmod proxy proxy_http headers ssl
#
# Node sureci ayri calismali:  node server.js   veya pm2 start server.js
# Varsayilan port: 5000  (.env ile PORT= degistirilebilir)
# =============================================================================

# --- SECENEK A: Bu alt alan adi SADECE Vardiya icin (kokten Node'a) ----------
# mail.sinanacar.com.tr tamamen bu uygulamaya gidecekse ornek:

# <VirtualHost *:443>
#     ServerName mail.sinanacar.com.tr
#     SSLEngine on
#     SSLCertificateFile /yol/fullchain.pem
#     SSLCertificateKeyFile /yol/privkey.pem
#
#     ProxyPreserveHost On
#     RequestHeader set X-Forwarded-Proto "https"
#
#     ProxyPass        / http://127.0.0.1:5000/
#     ProxyPassReverse / http://127.0.0.1:5000/
# </VirtualHost>

# --- SECENEK B: Ayni hostta baska yazilim var; Vardiya /vardiya altinda -------
# Tarayici: https://mail.sinanacar.com.tr/vardiya/
# .env: PUBLIC_URL_PATH=/vardiya
#       APP_BASE_URL=https://mail.sinanacar.com.tr
#       SESSION_COOKIE_PATH=/vardiya

# ProxyPass        /vardiya/ http://127.0.0.1:5000/
# ProxyPassReverse /vardiya/ http://127.0.0.1:5000/
# RequestHeader set X-Forwarded-Proto "https"

# Not: Sonda / onemli; boylece /vardiya/... istekleri Node'da /... olur.
